<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>i9wizard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Particle canvas -->
  <canvas id="particles"></canvas>

  <!-- Scan-line overlay -->
  <div class="scanlines"></div>

  <!-- Main UI -->
  <main class="terminal" id="terminal">

    <!-- Prompt header -->
    <div class="prompt-header">
      <span class="prompt-label">i9wizard</span>
      <span class="prompt-sep">~</span>
      <span class="prompt-path">/ access</span>
    </div>

    <!-- Input row -->
    <div class="input-row" id="inputRow">
      <span class="prompt-char">›</span>
      <input
        type="text"
        id="wizardInput"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="type wizard to enter the site"
        aria-label="Enter the magic word"
      />
      <span class="cursor" id="cursor">▊</span>
    </div>

    <!-- Error message -->
    <div class="error-msg" id="errorMsg">
      <span class="err-icon">✕</span> Access denied. Are you a wizard?
    </div>

    <!-- Welcome message -->
    <div class="welcome-wrap" id="welcomeWrap">
      <p class="welcome-text" id="welcomeText"></p>
    </div>

  </main>

  <!-- Footer contact icon -->
  <footer class="footer" id="footer">
    <a href="mailto:me@i9wizard.com" class="mail-link" aria-label="Send email">
      <svg class="mail-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <polyline points="2,4 12,13 22,4" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
