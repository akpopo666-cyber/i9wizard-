<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i9wizard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{
    --bg: #0a0a0d;
    --bg-deep: #050507;
    --gold: #c9a86a;
    --gold-soft: #8d7a52;
    --ink: #e9e4d8;
    --ink-dim: #756f63;
    --violet: #4a3f6b;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    background:var(--bg-deep);
    color:var(--ink);
    overflow:hidden;
    height:100%;
    font-family:'Jost', sans-serif;
  }

  .font-display{ font-family:'Cormorant Garamond', serif; }

  /* ---------- Starfield ---------- */
  #stars-canvas{
    position:fixed;
    inset:0;
    z-index:0;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(74,63,107,0.18), transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(40,35,20,0.15), transparent 55%),
      var(--bg-deep);
  }

  /* ---------- Stage handling ---------- */
  .stage{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
  }

  #main-stage{
    opacity:0;
    pointer-events:none;
    transition: opacity 1.8s ease;
  }

  #main-stage.revealed{
    opacity:1;
    pointer-events:auto;
  }

  #gate-stage{
    transition: opacity 1.4s ease, filter 1.4s ease;
  }

  #gate-stage.dissolving{
    opacity:0;
    filter: blur(8px);
    pointer-events:none;
  }

  /* ---------- Gate styling ---------- */
  .gate-prompt{
    letter-spacing:0.35em;
    text-transform:uppercase;
    font-size:0.75rem;
    color:var(--ink-dim);
    font-weight:300;
  }

  .type-display{
    font-family:'Cormorant Garamond', serif;
    font-weight:300;
    font-size:clamp(2.2rem, 7vw, 4.5rem);
    letter-spacing:0.08em;
    color:var(--ink);
    min-height:1.3em;
    position:relative;
  }

  .cursor-blink{
    display:inline-block;
    width:2px;
    background:var(--gold);
    margin-left:6px;
    animation: blink 1.1s step-end infinite;
    vertical-align: -0.1em;
  }

  @keyframes blink{
    0%,50%{ opacity:1; }
    50.01%,100%{ opacity:0; }
  }

  .gate-underline{
    width:min(360px, 70vw);
    height:1px;
    background: linear-gradient(90deg, transparent, var(--gold-soft) 50%, transparent);
    margin:0 auto;
  }

  .gate-hint{
    font-size:0.65rem;
    letter-spacing:0.25em;
    color:var(--ink-dim);
    text-transform:uppercase;
    opacity:0.6;
  }

  .shake{
    animation: shake 0.45s ease;
  }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-8px); }
    40%{ transform:translateX(8px); }
    60%{ transform:translateX(-5px); }
    80%{ transform:translateX(5px); }
  }

  /* ---------- Main stage styling ---------- */
  .brandmark{
    position:fixed;
    top:2.2rem;
    left:50%;
    transform:translateX(-50%);
    font-family:'Cormorant Garamond', serif;
    font-weight:400;
    font-size:0.95rem;
    letter-spacing:0.4em;
    text-transform:uppercase;
    color:var(--gold-soft);
    z-index:20;
    opacity:0;
    animation: fadeUp 1.6s ease forwards;
    animation-delay:0.4s;
  }

  .main-headline{
    font-family:'Cormorant Garamond', serif;
    font-weight:300;
    font-size:clamp(2.6rem, 8vw, 6.2rem);
    letter-spacing:0.04em;
    line-height:1.05;
    color:var(--ink);
    text-shadow: 0 0 40px rgba(201,168,106,0.18);
    opacity:0;
    animation: fadeUp 1.8s ease forwards;
    animation-delay:0.7s;
  }

  .sub-headline{
    margin-top:1.4rem;
    font-weight:300;
    font-size:clamp(0.7rem, 1.4vw, 0.95rem);
    letter-spacing:0.45em;
    text-transform:uppercase;
    color:var(--ink-dim);
    opacity:0;
    animation: fadeUp 1.8s ease forwards;
    animation-delay:1.3s;
  }

  .glow-divider{
    width:1px;
    height:40px;
    margin:1.8rem auto 0;
    background: linear-gradient(to bottom, var(--gold-soft), transparent);
    opacity:0;
    animation: fadeUp 1.8s ease forwards, pulse-glow 4s ease-in-out infinite;
    animation-delay:1.7s, 3s;
  }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(18px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @keyframes pulse-glow{
    0%,100%{ opacity:0.3; }
    50%{ opacity:0.85; }
  }

  /* ---------- Contact icon ---------- */
  .contact-link{
    position:fixed;
    bottom:2.4rem;
    right:2.4rem;
    z-index:20;
    width:42px;
    height:42px;
    border:1px solid rgba(201,168,106,0.35);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--gold-soft);
    opacity:0;
    transition: border-color 0.4s ease, color 0.4s ease, box-shadow 0.4s ease, transform 0.3s ease;
    animation: fadeUp 1.8s ease forwards;
    animation-delay:2.1s;
  }

  .contact-link:hover{
    color:var(--ink);
    border-color:var(--gold);
    box-shadow: 0 0 18px rgba(201,168,106,0.35);
    transform: translateY(-2px);
  }

  .contact-link svg{ width:16px; height:16px; }

  @media (max-width:640px){
    .contact-link{ bottom:1.6rem; right:1.6rem; }
    .brandmark{ top:1.6rem; font-size:0.75rem; letter-spacing:0.3em; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<!-- ============ GATE STAGE ============ -->
<div id="gate-stage" class="stage">
  <div id="gate-shake-target" class="flex flex-col items-center gap-6 px-6 text-center">
    <p class="gate-prompt">Type wizard to enter the site</p>
    <div id="type-display" class="type-display" aria-live="polite">
      <span id="typed-text"></span><span class="cursor-blink">&nbsp;</span>
    </div>
    <div class="gate-underline"></div>
    <p class="gate-hint">press enter when ready</p>
  </div>
</div>

<!-- ============ MAIN STAGE ============ -->
<div id="main-stage" class="stage">
  <p class="brandmark">i9wizard</p>
  <div class="flex flex-col items-center text-center px-6">
    <h1 class="main-headline">Smile you are alive</h1>
    <p class="sub-headline">appreciate everything</p>
    <div class="glow-divider"></div>
  </div>
</div>

<a href="mailto:me@i9wizard.com" class="contact-link" aria-label="Email me@i9wizard.com" title="me@i9wizard.com">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
    <path d="M22 6l-10 7L2 6"/>
  </svg>
</a>

<script>
  // ---------------- Starfield animation ----------------
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initStars();
  }

  function initStars(){
    const count = Math.floor((canvas.width * canvas.height) / 9000);
    stars = Array.from({length: count}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      baseAlpha: Math.random() * 0.5 + 0.2,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.015 + 0.005
    }));
  }

  function drawStars(time){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for(const s of stars){
      const twinkle = Math.sin(time * s.speed * 50 + s.phase) * 0.5 + 0.5;
      const alpha = s.baseAlpha * (0.4 + twinkle * 0.6);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(230, 222, 200, ${alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(drawStars);

  // ---------------- Gate typing logic ----------------
  const PASSWORD = 'wizard';
  const typedTextEl = document.getElementById('typed-text');
  const gateStage = document.getElementById('gate-stage');
  const mainStage = document.getElementById('main-stage');
  const shakeTarget = document.getElementById('gate-shake-target');

  let buffer = '';

  function renderTyped(){
    typedTextEl.textContent = buffer;
  }

  function triggerShake(){
    shakeTarget.classList.remove('shake');
    void shakeTarget.offsetWidth;
    shakeTarget.classList.add('shake');
  }

  function enterSite(){
    document.removeEventListener('keydown', handleKey);
    gateStage.classList.add('dissolving');
    mainStage.classList.add('revealed');
    setTimeout(() => {
      gateStage.style.display = 'none';
    }, 1500);
  }

  function handleKey(e){
    if(e.key === 'Enter'){
      if(buffer.toLowerCase() === PASSWORD){
        enterSite();
      } else {
        triggerShake();
      }
      return;
    }

    if(e.key === 'Backspace'){
      buffer = buffer.slice(0, -1);
      renderTyped();
      return;
    }

    if(e.key.length === 1 && /[a-zA-Z]/.test(e.key) && !e.ctrlKey && !e.metaKey && !e.altKey){
      if(buffer.length < PASSWORD.length){
        buffer += e.key;
        renderTyped();
      }
    }
  }

  document.addEventListener('keydown', handleKey);
</script>
</body>
</html>
