<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>i9wizard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void:    #0A0A0F;
      --gold:    #C9A84C;
      --gold-lt: #E8C96A;
      --lavender:#B8A9D9;
      --mist:    #F8F5FF;
      --arcane:  #2D1B69;
    }

    body {
      background: var(--void);
      color: var(--mist);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.8rem 4rem;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,168,76,0.1);
      background: rgba(10,10,15,0.5);
    }

    .nav-logo {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
      text-decoration: none;
    }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* ── LOGIN FORM ── */
    .login-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
      width: 100%;
      max-width: 300px;
      margin-top: 2.8rem;
    }

    .input-wrap {
      width: 100%;
    }

    .input-wrap input {
      width: 100%;
      background: rgba(10,10,15,0.8);
      border: 1px solid rgba(201,168,76,0.25);
      color: var(--mist);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      padding: 0.8rem 1.1rem;
      outline: none;
      transition: border-color 0.3s;
      text-align: center;
    }

    .input-wrap input::placeholder {
      color: rgba(184,169,217,0.35);
      letter-spacing: 0.2em;
      font-size: 0.7rem;
    }

    .input-wrap input:focus {
      border-color: rgba(201,168,76,0.55);
    }

    .login-btn {
      width: 100%;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--void);
      background: linear-gradient(135deg, var(--gold-lt), var(--gold));
      border: none;
      padding: 0.85rem;
      cursor: pointer;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
      transition: opacity 0.3s, transform 0.3s;
      margin-top: 0.3rem;
    }

    .login-btn:hover { opacity: 0.85; transform: translateY(-1px); }

    .login-error {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: #e07070;
      opacity: 0;
      transition: opacity 0.3s;
      min-height: 0.9rem;
    }

    .login-error.show { opacity: 1; }

    /* ── SIGIL ── */
    .sigil-wrap {
      position: relative;
      width: 280px;
      height: 280px;
      margin-bottom: 3rem;
    }

    .sigil-glow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.16) 0%, rgba(45,27,105,0.22) 50%, transparent 75%);
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.06); }
    }

    .ring-outer { animation: spinSlow 40s linear infinite; transform-origin: center; }
    .ring-mid   { animation: spinSlow 28s linear infinite reverse; transform-origin: center; }
    .ring-inner { animation: spinSlow 18s linear infinite; transform-origin: center; }

    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.2rem, 7vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 1;
      background: linear-gradient(135deg, var(--gold-lt) 0%, var(--gold) 45%, var(--lavender) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @media (max-width: 600px) {
      nav { padding: 1.4rem 1.5rem; }
      .sigil-wrap { width: 200px; height: 200px; }
      .login-box { margin: 0 1.5rem; padding: 2rem 1.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .ring-outer, .ring-mid, .ring-inner, .sigil-glow { animation: none; }
    }
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<nav>
  <a class="nav-logo" href="#">i9wizard</a>
</nav>

<main>
  <div class="sigil-wrap">
    <div class="sigil-glow"></div>
    <svg viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <defs>
        <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#E8C96A"/>
          <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.4"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
          <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <g class="ring-outer" filter="url(#glow)">
        <circle cx="160" cy="160" r="148" stroke="#C9A84C" stroke-width="0.8" stroke-opacity="0.4"/>
        <circle cx="160" cy="160" r="140" stroke="#C9A84C" stroke-width="0.4" stroke-opacity="0.25" stroke-dasharray="4 8"/>
        <g stroke="#C9A84C" stroke-width="1.2" stroke-opacity="0.6">
          <line x1="160" y1="12" x2="160" y2="24"/>
          <line x1="160" y1="296" x2="160" y2="308"/>
          <line x1="12" y1="160" x2="24" y2="160"/>
          <line x1="296" y1="160" x2="308" y2="160"/>
          <line x1="54" y1="54" x2="62" y2="62"/>
          <line x1="258" y1="258" x2="266" y2="266"/>
          <line x1="266" y1="54" x2="258" y2="62"/>
          <line x1="62" y1="258" x2="54" y2="266"/>
          <line x1="107" y1="16" x2="110" y2="28"/>
          <line x1="213" y1="292" x2="210" y2="304"/>
          <line x1="16" y1="107" x2="28" y2="110"/>
          <line x1="292" y1="213" x2="304" y2="210"/>
        </g>
      </g>
      <g class="ring-mid" filter="url(#glow)">
        <circle cx="160" cy="160" r="108" stroke="#B8A9D9" stroke-width="0.6" stroke-opacity="0.35"/>
        <polygon points="160,52 172,140 260,160 172,180 160,268 148,180 60,160 148,140"
          stroke="#C9A84C" stroke-width="0.9" stroke-opacity="0.5" fill="none"/>
      </g>
      <g class="ring-inner" filter="url(#glow)">
        <circle cx="160" cy="160" r="68" stroke="#B8A9D9" stroke-width="0.7" stroke-opacity="0.4"/>
        <circle cx="160" cy="160" r="56" stroke="#C9A84C" stroke-width="0.4" stroke-opacity="0.3" stroke-dasharray="2 6"/>
        <polygon points="160,100 207,188 113,188"
          stroke="#E8C96A" stroke-width="1" stroke-opacity="0.65" fill="rgba(201,168,76,0.04)"/>
        <polygon points="160,220 113,132 207,132"
          stroke="#B8A9D9" stroke-width="0.8" stroke-opacity="0.5" fill="rgba(184,169,217,0.03)"/>
      </g>
      <g filter="url(#glow)">
        <circle cx="160" cy="160" r="18" fill="rgba(201,168,76,0.15)" stroke="#C9A84C" stroke-width="1"/>
        <circle cx="160" cy="160" r="8" fill="url(#goldGrad)"/>
        <circle cx="163" cy="157" r="2.5" fill="rgba(248,245,255,0.7)"/>
      </g>
    </svg>
  </div>

  <h1 class="title">You Are Precious</h1>

  <div class="login-form">
    <div class="input-wrap">
      <input type="text" id="username" placeholder="USERNAME" autocomplete="off" />
    </div>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="PASSWORD" />
    </div>
    <p class="login-error" id="login-error">Invalid credentials</p>
    <button class="login-btn" onclick="doLogin()">Enter</button>
  </div>
</main>

<script>
  // ── STARFIELD ──
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const stars = Array.from({length: 200}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.2 + 0.2,
    speed: Math.random() * 0.00015 + 0.00005,
    phase: Math.random() * Math.PI * 2,
    gold: Math.random() > 0.85
  }));
  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const opacity = 0.25 + 0.55 * Math.sin(s.phase + t * s.speed * 1000);
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.gold ? `rgba(201,168,76,${opacity})` : `rgba(248,245,255,${opacity * 0.6})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);

  // ── LOGIN ──
  // username နဲ့ password ပြောင်းချင်ရင် ဒီမှာ ပြောင်းပါ
  const CREDENTIALS = { username: 'i9wizard', password: 'precious2024' };

  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const err = document.getElementById('login-error');
    if (u === CREDENTIALS.username && p === CREDENTIALS.password) {
      err.classList.remove('show');
      document.querySelector('.login-form').style.display = 'none';
    } else {
      err.classList.add('show');
      document.getElementById('password').value = '';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>

</body>
</html>
