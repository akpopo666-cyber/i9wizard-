<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>i9wizard</title>
<link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void:    #0A0A0F;
      --gold:    #C9A84C;
      --gold-lt: #E8C96A;
      --lavender:#B8A9D9;
      --mist:    #F8F5FF;
      --arcane:  #2D1B69;
    }

    body {
      background: var(--void);
      color: var(--mist);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1.8rem 4rem;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(201,168,76,0.1);
      background: rgba(10,10,15,0.5);
    }

    .nav-logo {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
      text-decoration: none;
    }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* ── LOGIN FORM ── */
    .login-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
      width: 100%;
      max-width: 300px;
      margin-top: 2.8rem;
    }

    .input-wrap {
      width: 100%;
    }

    .input-wrap input {
      width: 100%;
      background: rgba(10,10,15,0.8);
      border: 1px solid rgba(201,168,76,0.25);
      color: var(--mist);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      padding: 0.8rem 1.1rem;
      outline: none;
      transition: border-color 0.3s;
      text-align: center;
    }

    .input-wrap input::placeholder {
      color: rgba(184,169,217,0.35);
      letter-spacing: 0.2em;
      font-size: 0.7rem;
    }

    .input-wrap input:focus {
      border-color: rgba(201,168,76,0.55);
    }

    .login-btn {
      width: 100%;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--void);
      background: linear-gradient(135deg, var(--gold-lt), var(--gold));
      border: none;
      padding: 0.85rem;
      cursor: pointer;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
      transition: opacity 0.3s, transform 0.3s;
      margin-top: 0.3rem;
    }

    .login-btn:hover { opacity: 0.85; transform: translateY(-1px); }

    .login-error {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: #e07070;
      opacity: 0;
      transition: opacity 0.3s;
      min-height: 0.9rem;
    }

    .login-error.show { opacity: 1; }

    /* ── SIGIL ── */
    .sigil-wrap {
      position: relative;
      width: 280px;
      height: 280px;
      margin-bottom: 3rem;
    }

    .sigil-glow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.16) 0%, rgba(45,27,105,0.22) 50%, transparent 75%);
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.06); }
    }

    .ring-outer { animation: spinSlow 40s linear infinite; transform-origin: center; }
    .ring-mid   { animation: spinSlow 28s linear infinite reverse; transform-origin: center; }
    .ring-inner { animation: spinSlow 18s linear infinite; transform-origin: center; }

    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.2rem, 7vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      line-height: 1;
      text-align: center;
      background: linear-gradient(135deg, var(--gold-lt) 0%, var(--gold) 45%, var(--lavender) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .contact-link {
      margin-top: 1.8rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(184,169,217,0.45);
      text-decoration: none;
      transition: color 0.3s;
    }

    .contact-link:hover {
      color: var(--gold-lt);
    }

    .contact-link svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* ── WELCOME PAGE ── */
    #welcome-page {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      animation: fadeIn 1.6s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .welcome-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.4rem, 8vw, 5.5rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-align: center;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--gold-lt) 0%, var(--gold) 45%, var(--lavender) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .smile-figure {
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 0.2rem;
      border: 1.5px solid rgba(201,168,76,0.35);
      box-shadow: 0 0 32px rgba(201,168,76,0.2), 0 0 80px rgba(45,27,105,0.3);
      animation: floatUp 4s ease-in-out infinite;
    }

    @keyframes floatUp {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      96%            { transform: scaleY(0.08); }
    }

    @keyframes waveLeft {
      0%, 100% { transform: rotate(0deg);   }
      25%       { transform: rotate(-22deg); }
      75%       { transform: rotate(12deg);  }
    }

    @keyframes waveRight {
      0%, 100% { transform: rotate(0deg);  }
      25%       { transform: rotate(22deg); }
      75%       { transform: rotate(-12deg);}
    }

    @keyframes heartbeat {
      0%, 100%  { transform: scale(1);    }
      14%        { transform: scale(1.3);  }
      28%        { transform: scale(1);    }
      42%        { transform: scale(1.18); }
      56%        { transform: scale(1);    }
    }

    @keyframes browRaise {
      0%, 80%, 100% { transform: translateY(0);   }
      90%            { transform: translateY(-2px); }
    }

    @keyframes smileGrow {
      0%, 100% { transform: scaleY(1);    }
      50%       { transform: scaleY(1.15); }
    }

    @keyframes cheekGlow {
      0%, 100% { opacity: 0.18; }
      50%       { opacity: 0.38; }
    }

    .eye-left  { transform-origin: 70px 41px; animation: blink 4.5s ease-in-out infinite; }
    .eye-right { transform-origin: 90px 41px; animation: blink 4.5s ease-in-out infinite 0.12s; }
    .arm-left  { transform-origin: 64px 100px; animation: waveLeft  3.2s ease-in-out infinite; }
    .arm-right { transform-origin: 96px 100px; animation: waveRight 3.2s ease-in-out infinite 0.5s; }
    .heart     { transform-origin: 80px 106px; animation: heartbeat 1.8s ease-in-out infinite; }
    .brow-left, .brow-right { animation: browRaise 4.5s ease-in-out infinite; }
    .smile-mouth { transform-origin: 80px 58px; animation: smileGrow 3s ease-in-out infinite; }
    .cheek-left, .cheek-right { animation: cheekGlow 3s ease-in-out infinite; }

    .welcome-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(184,169,217,0.45);
      text-align: center;
    }

    @media (max-width: 600px) {
      nav { padding: 1.4rem 1.5rem; }
      .sigil-wrap { width: 200px; height: 200px; }
      .login-box { margin: 0 1.5rem; padding: 2rem 1.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .ring-outer, .ring-mid, .ring-inner, .sigil-glow { animation: none; }
    }
  </style>
</head>

<canvas id="stars-canvas"></canvas>

  <a class="nav-logo" href="#">i9wizard</a>

    </svg>
  </div>

  <h1 class="title">You Are Precious</h1>

  <div class="login-form">
    <div class="input-wrap">
      <input type="text" id="username" placeholder="USERNAME" autocomplete="off" />
    </div>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="PASSWORD" />
    </div>
    <p class="login-error" id="login-error">Invalid credentials</p>
    <button class="login-btn" onclick="doLogin()">Enter</button>
  </div>
  <a class="contact-link" href="mailto:me@i9wizard.com" title="me@i9wizard.com">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

    </svg>

  <h1 class="welcome-title">Smile You Are Alive</h1>
  <p class="welcome-sub">appreciate everything</p>
</div>

<script>
  // ── STARFIELD ──
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  // သဘာဝဆန်ဆန် ကြယ်တွေ — အရွယ်အစား၊ အလင်းအားနှင့် မှိတ်တုတ်နှုန်း မတူညီ
  const stars = Array.from({length: 220}, () => {
    const type = Math.random();
    return {
      x: Math.random(),
      y: Math.random(),
      // ကြယ်အရွယ် ၃ မျိုး: သေးငယ်၊ အလတ်၊ အကြီး
      r: type < 0.65 ? Math.random() * 0.6 + 0.15      // သေးငယ် — အများဆုံး
        : type < 0.90 ? Math.random() * 0.7 + 0.6      // အလတ်
        : Math.random() * 0.8 + 1.1,                   // အကြီး — ရှားပါး
      // မှိတ်တုတ်နှုန်း — အရမ်းနှေးနှေး (သဘာဝဆန်ဆန်)
      twinkleSpeed: Math.random() * 0.0004 + 0.0001,   // ဟောင်းက ၁၅x ပိုမြန်ခဲ့
      twinkleAmp:   Math.random() * 0.35 + 0.1,        // မှိတ်တုတ်ပမာဏ သေးငယ်
      baseOpacity:  Math.random() * 0.35 + 0.25,       // အခြေခံ brightness
      phase:        Math.random() * Math.PI * 2,
      gold:         Math.random() > 0.88,
      // အချို့ကြယ်တွေ လုံးဝမမှိတ်တုတ် (တည်ငြိမ်)
      steady:       Math.random() > 0.75,
    };
  });

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      let opacity;
      if (s.steady) {
        // တည်ငြိမ်တဲ့ကြယ် — မမှိတ်တုတ်
        opacity = s.baseOpacity;
      } else {
        // ဖြည်းဖြည်းချင်း မှိတ်တုတ်
        opacity = s.baseOpacity + s.twinkleAmp * Math.sin(s.phase + t * s.twinkleSpeed * 1000);
      }
      opacity = Math.max(0.02, Math.min(1, opacity));
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.gold
        ? `rgba(201,168,76,${opacity})`
        : `rgba(248,245,255,${opacity})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);

  // ── LOGIN ──
  // username နဲ့ password ပြောင်းချင်ရင် ဒီမှာ ပြောင်းပါ
  const CREDENTIALS = { username: 'i9wizard', password: 'precious2024' };

  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const err = document.getElementById('login-error');
    if (u === CREDENTIALS.username && p === CREDENTIALS.password) {
      err.classList.remove('show');
      document.querySelector('main').style.display = 'none';
      document.getElementById('welcome-page').style.display = 'flex';
    } else {
      err.classList.add('show');
      document.getElementById('password').value = '';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
